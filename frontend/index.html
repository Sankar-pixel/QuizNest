<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizNest — Neon City Quiz</title>

  <!-- Tailwind CSS (CDN, JIT) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Orbitron"', 'sans-serif'],
            body: ['"Rajdhani"', 'sans-serif'],
          },
          colors: {
            'neon-cyan': '#00f6ff',
            'neon-magenta': '#ff2fd4',
            'neon-green': '#39ff88',
            'neon-amber': '#ffb400',
            'neon-crimson': '#ff2b4e',
            'neon-emerald': '#12e6a0',
          },
        },
      },
    };
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Import map: Three.js core + examples (post-processing, GSAP) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js"
      }
    }
  </script>

  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #050109; }
    #scene-canvas { position: fixed; inset: 0; display: block; }

    .glass-panel {
      background: rgba(10, 6, 24, 0.55);
      border: 1px solid rgba(0, 246, 255, 0.25);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      box-shadow: 0 0 40px rgba(0, 246, 255, 0.08), inset 0 0 30px rgba(255, 47, 212, 0.04);
    }

    .answer-card {
      transition: transform 160ms ease, box-shadow 200ms ease, border-color 200ms ease;
    }
    .answer-card:hover {
      transform: translateY(-3px) scale(1.015);
      border-color: rgba(0, 246, 255, 0.6);
      box-shadow: 0 0 24px rgba(0, 246, 255, 0.25);
    }
    .answer-card.correct {
      border-color: #39ff88 !important;
      box-shadow: 0 0 32px rgba(57, 255, 136, 0.5) !important;
    }
    .answer-card.incorrect {
      border-color: #ff2b4e !important;
      box-shadow: 0 0 32px rgba(255, 43, 78, 0.5) !important;
    }

    .xp-fill {
      transition: width 500ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .glitch-active {
      animation: glitchShake 320ms ease-in-out;
    }
    @keyframes glitchShake {
      0%, 100% { transform: translate(0, 0); filter: none; }
      20% { transform: translate(-6px, 2px); filter: hue-rotate(20deg) saturate(2); }
      40% { transform: translate(5px, -3px); filter: hue-rotate(-25deg) saturate(2); }
      60% { transform: translate(-4px, -2px); filter: hue-rotate(15deg); }
      80% { transform: translate(3px, 3px); filter: hue-rotate(-10deg); }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 246, 255, 0.4); border-radius: 3px; }
  </style>
</head>
<body class="font-body text-white">

  <!-- WebGL mount point -->
  <canvas id="scene-canvas"></canvas>

  <!-- Top HUD: identity + XP bar -->
  <div id="hud-top" class="fixed top-0 left-0 right-0 z-20 flex items-center justify-between p-4 pointer-events-none">
    <div class="glass-panel rounded-xl px-5 py-3 pointer-events-auto">
      <p class="font-display text-sm tracking-widest text-neon-cyan">QUIZNEST</p>
      <p id="hud-username" class="text-xs text-white/60">guest_runner</p>
    </div>

    <div class="glass-panel rounded-xl px-5 py-3 w-72 pointer-events-auto">
      <div class="flex justify-between text-xs mb-1">
        <span id="hud-level" class="text-neon-amber font-semibold">LVL 1</span>
        <span id="hud-xp" class="text-white/60">0 XP</span>
      </div>
      <div class="h-2 w-full rounded-full bg-white/10 overflow-hidden">
        <div id="xp-bar" class="xp-fill h-full w-0 rounded-full bg-gradient-to-r from-neon-cyan to-neon-magenta"></div>
      </div>
    </div>
  </div>

  <!-- Quiz room overlay (hidden until a category is entered) -->
  <div id="quiz-overlay" class="fixed inset-0 z-30 flex flex-col items-center justify-center gap-6 p-6 hidden">
    <div id="question-panel" class="glass-panel rounded-2xl px-8 py-6 max-w-2xl w-full text-center">
      <p id="question-category" class="font-display text-xs tracking-[0.3em] text-neon-cyan mb-2">CATEGORY</p>
      <h2 id="question-text" class="font-display text-xl md:text-2xl leading-snug">Loading question…</h2>
    </div>

    <div id="answers-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl w-full">
      <!-- answer-card buttons injected by QuizUI.js -->
    </div>

    <button
      id="exit-quiz-btn"
      class="font-display text-xs tracking-widest text-white/50 hover:text-neon-crimson transition-colors pointer-events-auto"
    >
      ← RETURN TO CITY
    </button>
  </div>

  <!-- Bottom-left: contextual hint -->
  <div id="hud-hint" class="fixed bottom-4 left-4 z-20 glass-panel rounded-lg px-4 py-2 pointer-events-none">
    <p class="text-xs text-white/60">Click a glowing tower to enter its category</p>
  </div>

  <!-- Auth panel (simple login/register) -->
  <div id="auth-panel" class="fixed bottom-4 right-4 z-20 glass-panel rounded-xl p-4 w-64">
    <p class="font-display text-xs tracking-widest text-neon-magenta mb-2">SIGN IN</p>
    <input id="auth-username" type="text" placeholder="username"
      class="w-full mb-2 px-3 py-1.5 rounded bg-white/5 border border-white/10 text-sm outline-none focus:border-neon-cyan" />
    <input id="auth-password" type="password" placeholder="password"
      class="w-full mb-2 px-3 py-1.5 rounded bg-white/5 border border-white/10 text-sm outline-none focus:border-neon-cyan" />
    <div class="flex gap-2">
      <button id="auth-login-btn" class="flex-1 py-1.5 rounded bg-neon-cyan/20 border border-neon-cyan/50 text-xs hover:bg-neon-cyan/30 transition-colors">Login</button>
      <button id="auth-register-btn" class="flex-1 py-1.5 rounded bg-neon-magenta/20 border border-neon-magenta/50 text-xs hover:bg-neon-magenta/30 transition-colors">Register</button>
    </div>
    <p id="auth-status" class="text-[10px] text-white/40 mt-2"></p>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
